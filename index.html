        }
        .shake-animation { animation: shake 0.4s ease-in-out; }

        // Hàm xóa dấu câu để học sinh không bị sai oan
        function cleanText(str) {
            return str.replace(/[.,?]/g, '').trim();
        }

        function parseQuestions(raw) {
            const result = [];
            let qIdCounter = 0;
            const samples = raw.split(/BÀI TẬP SỐ\s*(\d+)/);
            
            for (let i = 1; i < samples.length; i += 2) {
                const sampleId = parseInt(samples[i]);
                const content = samples[i+1];
                const tasks = content.split(/Task\s*(\d+)[^\n]*\n/);

                for (let j = 1; j < tasks.length; j += 2) {
                    const taskId = parseInt(tasks[j]);
                    const lines = tasks[j+1].split('\n').map(l => l.trim()).filter(l => l);
                    
                    let qIndex = 0;
                    
                    if (taskId === 1 || taskId === 2) {
                        lines.forEach(line => {
                            if (line.match(/^[A-Za-z]\./)) {
                                const opts = [...line.matchAll(/(?:[A-Da-d])\.\s*(.+?)(?=(?:\s+[A-Da-d]\.)|$)/g)].map(m => m[1].trim());
                                if(opts.length > 0) {
                                    result.push({
                                        id: qIdCounter++, sample: sampleId, task: taskId,
                                        type: 'mcq',
                                        instruction: taskId === 1 ? "Chọn từ khác loại (Odd one out)" : "Chọn từ có phát âm khác",
                                        question: "",
                                        options: opts,
                                        correct: ANSWERS[sampleId][taskId][qIndex++]
                                    });
                                }
                            }
                        });
                    } else if (taskId === 3) {
                        for (let k = 0; k < lines.length; k++) {
                            if (lines[k].match(/^[A-Za-z]\./)) {
                                const opts = [...lines[k].matchAll(/(?:[A-Da-d])\.\s*(.+?)(?=(?:\s+[A-Da-d]\.)|$)/g)].map(m => m[1].trim());
                                const qText = cleanText(lines[k-1] || "");
                                result.push({
                                    id: qIdCounter++, sample: sampleId, task: taskId,
                                    type: 'mcq',
                                    instruction: "Chọn đáp án đúng nhất",
                                    question: qText,
                                    options: opts,
                                    correct: ANSWERS[sampleId][taskId][qIndex++]
                                });
                            }
                        }
                    } else if (taskId === 4) {
                        lines.forEach(line => {
                            if (line.includes('/')) {
                                const words = line.split('/').map(w => cleanText(w)).filter(w => w);
                                // Trộn ngẫu nhiên các từ
                                const shuffledWords = [...words].sort(() => Math.random() - 0.5);
                                result.push({
                                    id: qIdCounter++, sample: sampleId, task: taskId,
                                    type: 'reorder',
                                    instruction: "Sắp xếp các từ thành câu hoàn chỉnh",
                                    question: "",
                                    words: shuffledWords,
                                    correctStr: cleanText(ANSWERS[sampleId][taskId][qIndex++]).toLowerCase().replace(/\s+/g, '')
                                });
                            }
                        });
                    }
                }
            }
            return result;
        }

            name: '',

        };

        function startApp() {
            const nameInput = document.getElementById('student-name').value.trim();
            if (!nameInput) {
                alert("Em hãy nhập tên để bắt đầu nhé!");
                return;
            }
            appState.name = nameInput;
            document.getElementById('header-name').innerText = appState.name;
            
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            
            renderQuestion();
            updateUI();
        }

        function renderQuestion() {
            const q = appState.questions[appState.currentIndex];
            appState.currentReorderAnswer = []; // Reset reorder buffer
            
            document.getElementById('q-badge').innerText = `Câu ${appState.currentIndex + 1} / ${appState.questions.length}`;
            document.getElementById('q-sample-info').innerText = `Bài tập ${q.sample} - Task ${q.task}`;
            document.getElementById('q-instruction').innerText = q.instruction;
            document.getElementById('q-text').innerText = q.question;
            
            const area = document.getElementById('interactive-area');
            area.innerHTML = '';
            
            const isCompleted = appState.answers[appState.currentIndex] !== undefined;

            if (q.type === 'mcq') {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-4 mt-4';
                q.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `btn-press text-left text-xl font-bold p-6 rounded-2xl border-4 transition-all duration-200 
                        ${isCompleted && idx === q.correct ? 'bg-green-100 border-green-500 text-green-800' : 'bg-white border-blue-100 hover:border-blue-400 text-gray-700 hover:bg-blue-50'}`;
                    btn.innerHTML = `<span class="inline-block bg-blue-100 text-blue-600 rounded-lg w-10 h-10 text-center leading-10 mr-3">${String.fromCharCode(65+idx)}</span> ${opt}`;
                    btn.onclick = () => checkMcqAnswer(idx, btn);
                    grid.appendChild(btn);
                });
                area.appendChild(grid);
            } 
            else if (q.type === 'reorder') {
                // Dropzone (Câu trả lời)
                const answerZone = document.createElement('div');
                answerZone.id = 'reorder-answer-zone';
                answerZone.className = 'min-h-[80px] bg-blue-50 border-4 border-dashed border-blue-300 rounded-2xl p-4 flex flex-wrap gap-2 items-center mb-6';
                
                // Nguồn từ (Words pool)
                const wordPool = document.createElement('div');
                wordPool.id = 'reorder-word-pool';
                wordPool.className = 'flex flex-wrap gap-3 justify-center mb-6';
                
                // Nếu đã hoàn thành, hiển thị thẳng câu đúng
                if (isCompleted) {
                    answerZone.className = 'min-h-[80px] bg-green-100 border-4 border-solid border-green-500 rounded-2xl p-4 flex flex-wrap gap-2 items-center mb-6 text-xl font-bold text-green-800';
                    answerZone.innerText = ANSWERS[q.sample][q.task][appState.currentIndex % 10]; // Hacky fix for demo text
                    answerZone.innerText = "Câu đã hoàn thành chính xác!";
                } else {
                    q.words.forEach((word, idx) => {
                        const chip = document.createElement('button');
                        chip.className = 'btn-press bg-white border-2 border-indigo-200 text-indigo-700 font-extrabold text-xl px-5 py-3 rounded-xl shadow-sm hover:bg-indigo-50 hover:border-indigo-400';
                        chip.innerText = word;
                        chip.onclick = () => moveWord(chip, word, idx, true);
                        wordPool.appendChild(chip);
                    });
                }

                area.appendChild(answerZone);
                area.appendChild(wordPool);

                if (!isCompleted) {
                    const checkBtn = document.createElement('button');
                    checkBtn.className = 'mx-auto block bg-indigo-500 hover:bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black text-xl shadow-md btn-press';
                    checkBtn.innerText = 'Kiểm tra câu';
                    checkBtn.onclick = () => checkReorderAnswer();
                    area.appendChild(checkBtn);
                }
            }

            // Xử lý nút Next
            const btnNext = document.getElementById('btn-next');
            if (isCompleted) {
                btnNext.classList.remove('hidden');
            } else {
                btnNext.classList.add('hidden');
            }
        }

        // --- Logic Câu hỏi ---
        function checkMcqAnswer(selectedIndex, btnNode) {
            const q = appState.questions[appState.currentIndex];
            if (appState.answers[appState.currentIndex] !== undefined) return; // Đã làm đúng rồi

            if (selectedIndex === q.correct) {
                handleCorrect();
                btnNode.className = 'btn-press text-left text-xl font-bold p-6 rounded-2xl border-4 bg-green-100 border-green-500 text-green-800';
            } else {
                handleWrong(`Em đã chọn: ${q.options[selectedIndex]}`);
                btnNode.classList.add('bg-red-100', 'border-red-400', 'text-red-800', 'shake-animation');
                setTimeout(() => {
                    btnNode.classList.remove('shake-animation', 'bg-red-100', 'border-red-400', 'text-red-800');
                }, 500);
            }
        }

        function moveWord(chipNode, word, idx, isToAnswer) {
            const answerZone = document.getElementById('reorder-answer-zone');
            const wordPool = document.getElementById('reorder-word-pool');
            
            if (isToAnswer) {
                appState.currentReorderAnswer.push(word);
                chipNode.onclick = () => moveWord(chipNode, word, idx, false);
                chipNode.classList.replace('bg-white', 'bg-indigo-100');
                answerZone.appendChild(chipNode);
            } else {
                const i = appState.currentReorderAnswer.indexOf(word);
                if(i > -1) appState.currentReorderAnswer.splice(i, 1);
                chipNode.onclick = () => moveWord(chipNode, word, idx, true);
                chipNode.classList.replace('bg-indigo-100', 'bg-white');
                wordPool.appendChild(chipNode);
            }
        }

        function checkReorderAnswer() {
            const q = appState.questions[appState.currentIndex];
            const userStr = appState.currentReorderAnswer.join('').toLowerCase().replace(/\s+/g, '');
            
            if (userStr === q.correctStr) {
                handleCorrect();
            } else {
                handleWrong(`Câu của em ghép: ${appState.currentReorderAnswer.join(' ')}`);
                document.getElementById('reorder-answer-zone').classList.add('shake-animation', 'border-red-400', 'bg-red-50');
                setTimeout(() => {
                    document.getElementById('reorder-answer-zone').classList.remove('shake-animation', 'border-red-400', 'bg-red-50');
                }, 500);
            }
        }

        // --- Logic Phản hồi ---
        function handleCorrect() {
            // Đánh dấu đúng
            if (appState.answers[appState.currentIndex] === undefined) {
                appState.answers[appState.currentIndex] = true; // Đúng lần đầu
            }
            
            showFeedback(true);
            document.getElementById('btn-next').classList.remove('hidden');
            updateUI();
            fireConfetti();
        }

        function handleWrong(wrongDetail) {
            if (appState.answers[appState.currentIndex] === undefined) {
                appState.answers[appState.currentIndex] = false; // Đã từng sai
            }
            appState.lastWrong[appState.currentIndex] = wrongDetail;
            showFeedback(false);
        }

        function nextQuestion() {
            if (appState.currentIndex < appState.questions.length - 1) {
                appState.currentIndex++;
                renderQuestion();
            } else {
                showReport();
            }
        }

        // --- UI Updates ---
        function updateUI() {
            const totalDone = Object.keys(appState.answers).length;
            const total = appState.questions.length;
            
            document.getElementById('header-progress-text').innerText = `${totalDone}/${total}`;
            document.getElementById('progress-bar').style.width = `${(totalDone/total)*100}%`;

            // Kiểm tra mở khóa nút Báo Cáo: Hoàn thành 25 câu của bất kỳ Sample nào
            let unlockReport = false;
            const sampleCounts = {};
            Object.keys(appState.answers).forEach(qIdx => {
                const sId = appState.questions[qIdx].sample;
                sampleCounts[sId] = (sampleCounts[sId] || 0) + 1;
                if(sampleCounts[sId] >= 25) unlockReport = true;
            });

            if (unlockReport) {
                document.getElementById('btn-report').classList.remove('hidden');
            }
            
            renderQuickNavGrid();
        }

        function toggleQuickNav() {
            const modal = document.getElementById('quick-nav-modal');
            modal.classList.toggle('hidden');
        }

        function renderQuickNavGrid() {
            const grid = document.getElementById('quick-nav-grid');
            grid.innerHTML = '';
            appState.questions.forEach((q, i) => {
                const isDone = appState.answers[i] !== undefined;
                const btn = document.createElement('button');
                btn.className = `p-2 rounded-lg font-bold text-sm btn-press ${isDone ? 'bg-green-500 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`;
                btn.innerText = i + 1;
                btn.onclick = () => {
                    appState.currentIndex = i;
                    renderQuestion();
                    toggleQuickNav();
                };
                grid.appendChild(btn);
            });
        }

        // --- Popups ---
        function showFeedback(isCorrect) {
            const overlay = document.getElementById('feedback-overlay');
            const card = document.getElementById('feedback-card');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const desc = document.getElementById('feedback-desc');

            overlay.classList.remove('hidden');
            setTimeout(() => card.classList.remove('scale-90'), 10);

            if (isCorrect) {
                icon.innerText = "🎉";
                title.innerText = "Chính xác!";
                title.className = "text-3xl font-black mb-2 text-green-600";
                desc.innerText = "Em làm rất tốt, tiếp tục phát huy nhé!";
            } else {
                icon.innerText = "💡";
                title.innerText = "Chưa đúng rồi!";
                title.className = "text-3xl font-black mb-2 text-red-600";
                desc.innerText = "Hãy đọc lại kỹ câu hỏi và thử lại nhé.";
            }
        }

        function closeFeedback() {
            const card = document.getElementById('feedback-card');
            card.classList.add('scale-90');
            setTimeout(() => {
                document.getElementById('feedback-overlay').classList.add('hidden');
            }, 150);
        }

        // --- Report Modal ---
        function showReport() {
            let perfect = 0, redo = 0;
            const totalDone = Object.keys(appState.answers).length;
            
            Object.values(appState.answers).forEach(val => {
                if (val === true) perfect++;
                if (val === false) redo++;
            });

            document.getElementById('rp-total').innerText = `${totalDone}/300`;
            document.getElementById('rp-perfect').innerText = perfect;
            document.getElementById('rp-redo').innerText = redo;

            const tbody = document.getElementById('rp-table-body');
            tbody.innerHTML = '';
            
            // Render các câu đã làm sai
            Object.keys(appState.lastWrong).forEach(idx => {
                const q = appState.questions[idx];
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors";
                
                let correctAnswerStr = "";
                if(q.type === 'mcq') correctAnswerStr = q.options[q.correct];
                else correctAnswerStr = q.words.join(' '); // Hiển thị tạm

                tr.innerHTML = `
                    <td class="p-4 border-b-2 border-gray-100">
                        <span class="font-bold text-blue-600">[Câu ${parseInt(idx)+1}]</span> 
                        ${q.question || "Sắp xếp câu"}
                    </td>
                    <td class="p-4 border-b-2 border-gray-100 text-red-600 font-semibold">${appState.lastWrong[idx]}</td>
                    <td class="p-4 border-b-2 border-gray-100 text-green-600 font-bold">Chính xác</td>
                `;
                tbody.appendChild(tr);
            });
            
            if (Object.keys(appState.lastWrong).length === 0 && totalDone > 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-8 text-center text-gray-500 font-bold">Tuyệt vời! Em chưa làm sai câu nào cả! 🌟</td></tr>`;
            }

            document.getElementById('report-modal').classList.remove('hidden');
        }

        function closeReport() {
            document.getElementById('report-modal').classList.add('hidden');
        }

        // --- Confetti Effect (Siêu nhẹ) ---
        function fireConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.classList.remove('hidden');

            const particles = [];
            for(let i=0; i<100; i++) {
                particles.push({
                    x: canvas.width/2, y: canvas.height/2 + 100,
                    r: Math.random() * 6 + 2,
                    dx: Math.random() * 10 - 5,
                    dy: Math.random() * -10 - 5,
                    color: `hsl(${Math.random()*360}, 100%, 50%)`
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                particles.forEach(p => {
                    p.dy += 0.3; // gravity
                    p.x += p.dx;
                    p.y += p.dy;
                    if(p.y < canvas.height) active = true;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                });
                if(active) requestAnimationFrame(animate);
                else canvas.classList.add('hidden');
            }
            animate();
        }
    </script>
